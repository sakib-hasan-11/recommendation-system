name: CI/CD - Build & Push Docker Images to ECR

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'infra/docker/**'
      - 'requirements.txt'
      - 'common/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:  # Allow manual trigger

env:
  AWS_REGION: us-east-1
  REGISTRY_ALIAS: recommendation-system

jobs:
  # Step 1: Create ECR Repositories (if they don't exist)
  setup-ecr:
    name: Setup ECR Repositories
    runs-on: ubuntu-latest
    outputs:
      base-repo: ${{ steps.setup.outputs.base-repo }}
      ingestion-repo: ${{ steps.setup.outputs.ingestion-repo }}
      training-repo: ${{ steps.setup.outputs.training-repo }}
      api-repo: ${{ steps.setup.outputs.api-repo }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create ECR repositories
        id: setup
        run: |
          set -e
          
          REPOS=("$REGISTRY_ALIAS-base" "$REGISTRY_ALIAS-ingestion" "$REGISTRY_ALIAS-training" "$REGISTRY_ALIAS-api")
          
          for repo in "${REPOS[@]}"; do
            echo "Checking ECR repository: $repo"
            
            if ! aws ecr describe-repositories --repository-names "$repo" --region ${{ env.AWS_REGION }} 2>/dev/null; then
              echo "Creating ECR repository: $repo"
              aws ecr create-repository \
                --repository-name "$repo" \
                --region ${{ env.AWS_REGION }} \
                --image-tag-mutability MUTABLE \
                --image-scanning-configuration scanOnPush=true
              echo "Created: $repo"
            else
              echo "Repository already exists: $repo"
            fi
          done
          
          # Output repository URIs
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "base-repo=$ACCOUNT_ID.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/$REGISTRY_ALIAS-base" >> $GITHUB_OUTPUT
          echo "ingestion-repo=$ACCOUNT_ID.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/$REGISTRY_ALIAS-ingestion" >> $GITHUB_OUTPUT
          echo "training-repo=$ACCOUNT_ID.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/$REGISTRY_ALIAS-training" >> $GITHUB_OUTPUT
          echo "api-repo=$ACCOUNT_ID.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/$REGISTRY_ALIAS-api" >> $GITHUB_OUTPUT

  # Step 2: Build and Push Base Image
  build-base:
    name: Build & Push Base Image
    runs-on: ubuntu-latest
    needs: setup-ecr
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push base image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infra/docker/Dockerfile.base
          push: true
          tags: |
            ${{ needs.setup-ecr.outputs.base-repo }}:latest
            ${{ needs.setup-ecr.outputs.base-repo }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Base image pushed successfully"

  # Step 3: Build and Push Ingestion Image
  build-ingestion:
    name: Build & Push Ingestion Image
    runs-on: ubuntu-latest
    needs: [ setup-ecr, build-base ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push ingestion image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infra/docker/Dockerfile.ingestion
          push: true
          build-args: |
            BASE_IMAGE=${{ needs.setup-ecr.outputs.base-repo }}:${{ github.sha }}
          tags: |
            ${{ needs.setup-ecr.outputs.ingestion-repo }}:latest
            ${{ needs.setup-ecr.outputs.ingestion-repo }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Ingestion image pushed successfully"

  # Step 4: Build and Push Training Image
  build-training:
    name: Build & Push Training Image
    runs-on: ubuntu-latest
    needs: [ setup-ecr, build-base ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push training image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infra/docker/Dockerfile.training
          push: true
          build-args: |
            BASE_IMAGE=${{ needs.setup-ecr.outputs.base-repo }}:${{ github.sha }}
          tags: |
            ${{ needs.setup-ecr.outputs.training-repo }}:latest
            ${{ needs.setup-ecr.outputs.training-repo }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Training image pushed successfully"

  # Step 5: Build and Push API Image
  build-api:
    name: Build & Push API Image
    runs-on: ubuntu-latest
    needs: [ setup-ecr, build-base ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infra/docker/Dockerfile.api
          push: true
          build-args: |
            BASE_IMAGE=${{ needs.setup-ecr.outputs.base-repo }}:${{ github.sha }}
          tags: |
            ${{ needs.setup-ecr.outputs.api-repo }}:latest
            ${{ needs.setup-ecr.outputs.api-repo }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "API image pushed successfully"

  # Step 6: Production Readiness Check
  production-check:
    name: Production Readiness Check
    runs-on: ubuntu-latest
    needs: [ build-base, build-ingestion, build-training, build-api ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Production Configuration
        run: |
          echo "=== Production Readiness Check ==="
          echo ""
          
          # Check if all Dockerfiles exist
          echo "[1] Checking Dockerfiles..."
          test -f infra/docker/Dockerfile.base && echo "  ✓ Dockerfile.base" || exit 1
          test -f infra/docker/Dockerfile.ingestion && echo "  ✓ Dockerfile.ingestion" || exit 1
          test -f infra/docker/Dockerfile.training && echo "  ✓ Dockerfile.training" || exit 1
          test -f infra/docker/Dockerfile.api && echo "  ✓ Dockerfile.api" || exit 1
          
          # Check AWS Batch job definitions exist
          echo ""
          echo "[2] Checking AWS Batch Configurations..."
          test -f infra/aws_batch/ingestion_job.json && echo "  ✓ ingestion_job.json" || exit 1
          test -f infra/aws_batch/training_job.json && echo "  ✓ training_job.json" || exit 1
          test -f infra/aws_batch/iam_policy.json && echo "  ✓ iam_policy.json" || exit 1
          
          # Check requirements.txt
          echo ""
          echo "[3] Checking Dependencies..."
          test -f requirements.txt && echo "  ✓ requirements.txt" || exit 1
          
          # Check configuration files
          echo ""
          echo "[4] Checking Configuration..."
          test -f .env.example && echo "  ✓ .env.example" || exit 1
          test -f common/config/__init__.py && echo "  ✓ Configuration module" || exit 1
          
          echo ""
          echo "=== All Production Checks PASSED ✓ ==="

  # Step 8: Summary and Status
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [ setup-ecr, build-base, build-ingestion, build-training, build-api, production-check ]
    if: always()
    steps:
      - name: Deployment Summary
        run: |
          echo "=== GitHub Actions CI/CD Workflow Summary ==="
          echo ""
          echo "Build Results:"
          echo "  Base Image:       ${{ needs.build-base.result }}"
          echo "  Ingestion Image:  ${{ needs.build-ingestion.result }}"
          echo "  Training Image:   ${{ needs.build-training.result }}"
          echo "  API Image:        ${{ needs.build-api.result }}"
          echo ""
          echo "Images pushed to ECR repositories:"
          echo "  Base:       ${{ needs.setup-ecr.outputs.base-repo }}"
          echo "  Ingestion:  ${{ needs.setup-ecr.outputs.ingestion-repo }}"
          echo "  Training:   ${{ needs.setup-ecr.outputs.training-repo }}"
          echo "  API:        ${{ needs.setup-ecr.outputs.api-repo }}"
          echo ""
          echo "All images tagged with: ${{ github.sha }}"
          echo ""
          echo "Next steps:"
          echo "  1. Deploy using AWS Batch"
          echo "  2. Monitor with CloudWatch"
          echo "  3. Track experiments with MLflow"
