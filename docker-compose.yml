version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    ports:
      - "5000:5000"
    command: mlflow server --host 0.0.0.0
    volumes:
      - mlflow_data:/mlflow

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - redis
      - mlflow
    volumes:
      - .:/app

  streamlit:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    ports:
      - "8501:8501"
    environment:
      - API_ENDPOINT=http://api:8000
    command: streamlit run frontend/streamlit_app/app.py
    depends_on:
      - api
    volumes:
      - .:/app

volumes:
  redis_data:
  mlflow_data:
